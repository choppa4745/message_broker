version: "3.8"

services:
  broker:
    build: .
    container_name: pigeonmq-broker
    ports:
      - "1883:1883"
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: pigeonmq-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pigeonmq"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
