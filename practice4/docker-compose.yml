services:
  postgres:
    image: postgres:16-alpine
    container_name: practice4-postgres
    environment:
      POSTGRES_DB: isolation_lab
      POSTGRES_USER: lab_user
      POSTGRES_PASSWORD: lab_pass
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab_user -d isolation_lab"]
      interval: 3s
      timeout: 3s
      retries: 20
